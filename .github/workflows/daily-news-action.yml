name: Morning Finance Brief

on:
  schedule:
    # 每天台灣時間 07:00 執行（UTC 23:00 前一天）
    - cron: '0 23 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 commit & push 報告到 repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news & generate report
        run: python scripts/fetch_news.py

      - name: Send Telegram notification
        run: python scripts/notify_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/briefs/
          git diff --staged --quiet || git commit -m "📰 晨間財經報告 $(TZ='Asia/Taipei' date +'%Y-%m-%d')"
          git push

